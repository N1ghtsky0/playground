server:
  port: 8080

spring:
  datasource:
    driver-class-name: net.sf.log4jdbc.sql.jdbcapi.DriverSpy
    jdbc-url: jdbc:log4jdbc:mysql://localhost:13306/playground
    username: root
    password: 1234
  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp

mybatis:
  type-aliases-package: kim.jiwook.playground.vo
  mapper-locations: classpath:/mapper/*.xml
logging:
  level:
    jdbc:
      sqlonly: off
      sqltiming: info
      audit: off
      resultset: off
      resultsettable: info
      connection: off

server:
  port: 8080
  servlet:
    jsp:
      init-parameters:
        development: true

spring:
  datasource:
    driver-class-name: net.sf.log4jdbc.sql.jdbcapi.DriverSpy
    jdbc-url: jdbc:log4jdbc:mysql://db-mysql:3306/playground
    username: root
    password: 1234
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: false
    hibernate:
      ddl-auto: update
  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp

mybatis:
  type-aliases-package: kim.jiwook.playground.vo
  mapper-locations: classpath:/mapper/*.xml
logging:
  level:
    jdbc:
      sqlonly: off
      sqltiming: info
      audit: off
      resultset: off
      resultsettable: info
      connection: off

jwt:
  secret-key: 38722cd30c9edef93825c6589c4a9b592cfca0c33c3b0a4aca9c6f42eb072fd047e5864786eff74a9ab58d531f48be73da9d87bd5c99be26c5873fe14ca88224
  expiration-hours: 1
  issuer: playground